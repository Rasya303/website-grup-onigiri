<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Game Ulat Multi Player</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: #fff;
      border: 2px solid #333;
      margin-top: 10px;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Game Ulat Multi Player</h2>
  <button id="addPlayerBtn">Tambah Player 2</button>
  <canvas id="gameCanvas" width="600" height="600"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const box = 20;
    let snake1, snake2, direction1, direction2, food, score1, score2;
    let player2Active = false; // default hanya player 1

    function resetGame() {
      snake1 = [{ x: 5 * box, y: 10 * box }];
      snake2 = [{ x: 15 * box, y: 10 * box }];
      direction1 = null;
      direction2 = null;
      score1 = 0;
      score2 = 0;
      food = {
        x: Math.floor(Math.random() * 29 + 1) * box,
        y: Math.floor(Math.random() * 29 + 1) * box
      };
    }

    document.addEventListener("keydown", event => {
      // Player 1: panah
      if (event.key === "ArrowLeft" && direction1 !== "RIGHT") direction1 = "LEFT";
      else if (event.key === "ArrowUp" && direction1 !== "DOWN") direction1 = "UP";
      else if (event.key === "ArrowRight" && direction1 !== "LEFT") direction1 = "RIGHT";
      else if (event.key === "ArrowDown" && direction1 !== "UP") direction1 = "DOWN";

      // Player 2: WASD (hanya aktif kalau tombol ditekan)
      if (player2Active) {
        if (event.key === "a" && direction2 !== "RIGHT") direction2 = "LEFT";
        else if (event.key === "w" && direction2 !== "DOWN") direction2 = "UP";
        else if (event.key === "d" && direction2 !== "LEFT") direction2 = "RIGHT";
        else if (event.key === "s" && direction2 !== "UP") direction2 = "DOWN";
      }
    });

    function moveSnake(snake, direction) {
      let snakeX = snake[0].x;
      let snakeY = snake[0].y;

      if (direction === "LEFT") snakeX -= box;
      if (direction === "UP") snakeY -= box;
      if (direction === "RIGHT") snakeX += box;
      if (direction === "DOWN") snakeY += box;

      // wrap around
      if (snakeX < 0) snakeX = canvas.width - box;
      if (snakeY < 0) snakeY = canvas.height - box;
      if (snakeX >= canvas.width) snakeX = 0;
      if (snakeY >= canvas.height) snakeY = 0;

      // makan makanan
      if (snakeX === food.x && snakeY === food.y) {
        food = {
          x: Math.floor(Math.random() * 29 + 1) * box,
          y: Math.floor(Math.random() * 29 + 1) * box
        };
        return { x: snakeX, y: snakeY, grow: true };
      } else {
        snake.pop();
        return { x: snakeX, y: snakeY, grow: false };
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // ular 1
      for (let i = 0; i < snake1.length; i++) {
        ctx.fillStyle = i === 0 ? "green" : "lightgreen";
        ctx.fillRect(snake1[i].x, snake1[i].y, box, box);
        ctx.strokeRect(snake1[i].x, snake1[i].y, box, box);
      }

      // ular 2 (hanya kalau aktif)
      if (player2Active) {
        for (let i = 0; i < snake2.length; i++) {
          ctx.fillStyle = i === 0 ? "blue" : "lightblue";
          ctx.fillRect(snake2[i].x, snake2[i].y, box, box);
          ctx.strokeRect(snake2[i].x, snake2[i].y, box, box);
        }
      }

      // makanan
      ctx.fillStyle = "red";
      ctx.fillRect(food.x, food.y, box, box);

      // skor
      ctx.fillStyle = "black";
      ctx.font = "15px Arial";
      ctx.fillText("Skor P1: " + score1, 10, 20);
      if (player2Active) ctx.fillText("Skor P2: " + score2, 500, 20);

      // gerakkan ular 1
      if (direction1) {
        let result1 = moveSnake(snake1, direction1);
        let newHead1 = { x: result1.x, y: result1.y };
        // tabrak tubuh sendiri
        for (let i = 0; i < snake1.length; i++) {
          if (snake1[i].x === newHead1.x && snake1[i].y === newHead1.y) {
            resetGame();
            return;
          }
        }
        // tabrak tubuh lawan
        if (player2Active) {
          for (let i = 0; i < snake2.length; i++) {
            if (snake2[i].x === newHead1.x && snake2[i].y === newHead1.y) {
              resetGame();
              return;
            }
          }
        }
        snake1.unshift(newHead1);
        if (result1.grow) score1++;
      }

      // gerakkan ular 2 (kalau aktif)
      if (player2Active && direction2) {
        let result2 = moveSnake(snake2, direction2);
        let newHead2 = { x: result2.x, y: result2.y };
        // tabrak tubuh sendiri
        for (let i = 0; i < snake2.length; i++) {
          if (snake2[i].x === newHead2.x && snake2[i].y === newHead2.y) {
            resetGame();
            return;
          }
        }
        // tabrak tubuh lawan
        for (let i = 0; i < snake1.length; i++) {
          if (snake1[i].x === newHead2.x && snake1[i].y === newHead2.y) {
            resetGame();
            return;
          }
        }
        snake2.unshift(newHead2);
        if (result2.grow) score2++;
      }
    }

    // tombol untuk menambah player
    document.getElementById("addPlayerBtn").addEventListener("click", () => {
      player2Active = true;
    });

    resetGame();
    let game = setInterval(draw, 100);
  </script>
</body>
</html>
